spring:
  application:
    name: tabibma-backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    private-key-b64: ${JWT_PRIVATE_KEY_B64}
    public-key-b64: ${JWT_PUBLIC_KEY_B64}
    access-token-expiration-ms: ${JWT_EXPIRATION:900000}
    refresh-token-expiration-ms: ${REFRESH_TOKEN_EXPIRATION:2592000000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
